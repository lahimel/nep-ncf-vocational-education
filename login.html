<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lend A Hand India</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c1: #FFEDDB;
            --c2: #EDCDBB;
            --c3: #E3B7A0;
            --c4: #BF9270;
            --c4d: #a87c60;
            --brown: #3A2E25;
            --brown-mid: #6A5445;
            --brown-light: #9A8070;
            --white: #FFFFFF;
            --sh: 0 2px 12px rgba(58,46,37,.08);
            --sh-md: 0 6px 24px rgba(58,46,37,.12);
            --r: 12px;
            --ease: 200ms cubic-bezier(.4,0,.2,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'DM Sans',sans-serif;
            background: var(--white);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--sh-md);
            width: 100%; max-width: 440px;
            overflow: hidden;
            border: 1.5px solid var(--brown);
        }
        .login-header {
            background: var(--white);
            padding: 40px 36px 32px;
            text-align: center;
            border-bottom: 1.5px solid var(--brown);
        }
        .logo { width: 72px; height: auto; margin-bottom: 16px; }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; font-weight: 700;
            color: var(--brown); margin-bottom: 4px; letter-spacing: -.3px;
        }
        .login-header p { font-size: .85rem; color: var(--brown); font-weight: 400; }

        .login-body { padding: 32px 36px; }
        .form-group { margin-bottom: 18px; }
        label { display:block; margin-bottom:6px; font-size:.82rem; font-weight:600; color:var(--brown); letter-spacing:.1px; }
        input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid rgba(58,46,37,.3);
            border-radius: var(--r);
            font-size: .9rem; font-family: 'DM Sans', sans-serif;
            background: var(--c1); color: var(--brown);
            transition: border-color var(--ease), box-shadow var(--ease);
        }
        input:focus { outline:none; border-color:var(--brown); box-shadow:0 0 0 3px rgba(191,146,112,.15); background: var(--white); }

        .btn { width:100%; padding:12px; border:none; border-radius:var(--r); font-size:.92rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all var(--ease); }
        .btn-primary { background:var(--white); color:var(--brown); border:1.5px solid var(--brown); }
        .btn-primary:hover { background:var(--brown); color:var(--white); transform:translateY(-1px); box-shadow:0 6px 18px rgba(191,146,112,.3); }
        .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

        .error-message { background:rgba(139,32,32,.07); color:#7A1A1A; border:1px solid rgba(139,32,32,.12); padding:10px 14px; border-radius:var(--r); margin-bottom:16px; font-size:.82rem; display:none; }
        .error-message.show { display:block; }

        .home-link { text-align:center; margin-top:18px; }
        .home-link a { color:var(--brown); text-decoration:none; font-size:.82rem; font-weight:500; }
        .home-link a:hover { text-decoration:underline; }

        .change-password-form { display:none; }
        .change-password-form.show { display:block; }
        .password-hint { font-size:.78rem; color:var(--brown); margin-top:4px; }

        @media(max-width:480px) {
            .login-header { padding:28px 22px 24px; }
            .login-body { padding:24px 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>NEP Vocational Education</h1>
            <p>Lend A Hand India</p>
        </div>

        <div class="login-body">
            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="error-message" id="errorMessage"></div>
                
                <div class="form-group">
                    <label for="username">Username (UDISE Code)</label>
                    <input type="text" id="username" name="username" required autocomplete="username" />
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" />
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
            </form>

            <!-- Change Password Form (shown on first login) -->
            <form id="changePasswordForm" class="change-password-form">
                <div class="error-message" id="changePasswordError"></div>
                
                <div style="background:var(--c1);padding:16px;border-radius:8px;margin-bottom:24px;border-left:4px solid var(--brown);">
                    <strong>First Login:</strong> You must change your password to continue.
                </div>
                
                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" required />
                </div>
                
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="8" />
                    <p class="password-hint">Minimum 8 characters</p>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required minlength="8" />
                </div>
                
                <button type="submit" class="btn btn-primary" id="changePasswordBtn">Change Password &amp; Continue</button>
            </form>

            <div class="home-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL      = 'https://soesdipnikhtnuuemstm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
        
        const { createClient } = window.supabase;
        const supabaseClient   = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const loginForm          = document.getElementById('loginForm');
        const changePasswordForm = document.getElementById('changePasswordForm');
        const errorMessage       = document.getElementById('errorMessage');
        const changePasswordError= document.getElementById('changePasswordError');
        const loginBtn           = document.getElementById('loginBtn');
        const changePasswordBtn  = document.getElementById('changePasswordBtn');
        
        let currentUser = null;
        
        // ── LOGIN ──────────────────────────────────────────────────────────────
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) { showError('Please enter both username and password'); return; }
            
            loginBtn.disabled    = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const { data, error } = await supabaseClient.rpc('authenticate_user', {
                    p_username: username,
                    p_password: password
                });
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const user = data[0];
                    currentUser = user;
                    
                    await supabaseClient.rpc('log_login', {
                        p_user_id: user.user_id,
                        p_username: username,
                        p_success: true
                    });
                    
                    sessionStorage.setItem('loggedIn',       'true');
                    sessionStorage.setItem('userId',          user.user_id);
                    sessionStorage.setItem('username',        user.username);
                    sessionStorage.setItem('userRole',        user.role);
                    sessionStorage.setItem('userName',        user.full_name);
                    sessionStorage.setItem('udiseCode',       user.udise_code   || '');
                    sessionStorage.setItem('schoolName',      user.school_name  || '');
                    sessionStorage.setItem('hasKaushalBodh',  user.has_kaushal_bodh ? 'true' : 'false');
                    sessionStorage.setItem('spokeSchools',    JSON.stringify(user.spoke_schools || []));
                    
                    if (user.must_change_password) {
                        showChangePasswordForm();
                    } else {
                        redirectToDashboard(user.role);
                    }
                } else {
                    showError('Invalid username or password');
                    loginBtn.disabled    = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please try again.');
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Login';
            }
        });
        
        // ── CHANGE PASSWORD ────────────────────────────────────────────────────
        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword.length < 8)         { showChangePasswordError('Password must be at least 8 characters'); return; }
            if (newPassword !== confirmPassword)  { showChangePasswordError('New passwords do not match'); return; }
            if (currentPassword === newPassword)  { showChangePasswordError('New password must be different from current password'); return; }
            
            changePasswordBtn.disabled    = true;
            changePasswordBtn.textContent = 'Changing Password...';
            
            try {
                const { data, error } = await supabaseClient.rpc('change_password', {
                    p_user_id:     currentUser.user_id,
                    p_old_password: currentPassword,
                    p_new_password: newPassword
                });
                
                if (error) throw error;
                
                if (data === true) {
                    alert('Password changed successfully!');
                    redirectToDashboard(currentUser.role);
                } else {
                    showChangePasswordError('Current password is incorrect');
                    changePasswordBtn.disabled    = false;
                    changePasswordBtn.textContent = 'Change Password & Continue';
                }
            } catch (error) {
                console.error('Change password error:', error);
                showChangePasswordError('Failed to change password. Please try again.');
                changePasswordBtn.disabled    = false;
                changePasswordBtn.textContent = 'Change Password & Continue';
            }
        });
        
        // ── HELPERS ────────────────────────────────────────────────────────────
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }
        
        function showChangePasswordError(msg) {
            changePasswordError.textContent = msg;
            changePasswordError.classList.add('show');
            setTimeout(() => changePasswordError.classList.remove('show'), 5000);
        }
        
        function showChangePasswordForm() {
            loginForm.style.display = 'none';
            changePasswordForm.classList.add('show');
            document.getElementById('currentPassword').value = document.getElementById('password').value;
        }
        
        function redirectToDashboard(role) {
            if      (role === 'admin')        window.location.href = 'admin-panel.html';
            else if (role === 'teacher')      window.location.href = 'teacher-space.html';
            else if (role === 'field_officer')window.location.href = 'field-officer-space.html';
            else                              window.location.href = 'index.html';
        }
        
        // Redirect if already logged in
        if (sessionStorage.getItem('loggedIn') === 'true') {
            redirectToDashboard(sessionStorage.getItem('userRole'));
        }
    </script>
</body>
</html>
