<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lend A Hand India</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-cyan: #9ECAD6;
            --primary-slate: #748DAE;
            --primary-rose: #F5CBCB;
            --primary-blush: #FFEAEA;
            --text-dark: #3A4F5C;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, var(--primary-blush) 0%, #FFF 30%, var(--primary-blush) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(116, 141, 174, .25);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border: 1px solid rgba(158, 202, 214, .2);
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--primary-slate) 0%, var(--primary-cyan) 100%);
            padding: 48px 40px;
            text-align: center;
            color: white;
        }
        
        .logo {
            width: 90px;
            height: auto;
            margin-bottom: 16px;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .login-header p {
            font-size: 15px;
            opacity: 0.95;
        }
        
        .login-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8EEF2;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all .3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-cyan);
            box-shadow: 0 0 0 4px rgba(158, 202, 214, .15);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all .3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-slate) 0%, var(--primary-cyan) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(116, 141, 174, .3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #FEE;
            color: #C33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .home-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .home-link a {
            color: var(--primary-slate);
            text-decoration: none;
            font-size: 14px;
        }
        
        .home-link a:hover {
            text-decoration: underline;
        }
        
        .change-password-form {
            display: none;
        }
        
        .change-password-form.show {
            display: block;
        }
        
        .password-hint {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
        
        @media (max-width: 768px) {
            .login-header {
                padding: 32px 24px;
            }
            
            .login-body {
                padding: 28px 24px;
            }
            
            .logo {
                width: 70px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>NEP Vocational Education</h1>
            <p>Lend A Hand India</p>
        </div>

        <div class="login-body">
            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="error-message" id="errorMessage"></div>
                
                <div class="form-group">
                    <label for="username">Username (UDISE Code)</label>
                    <input type="text" id="username" name="username" required autocomplete="username" />
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" />
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Login
                </button>
            </form>

            <!-- Change Password Form (shown on first login) -->
            <form id="changePasswordForm" class="change-password-form">
                <div class="error-message" id="changePasswordError"></div>
                
                <div style="background: #FFF4E6; padding: 16px; border-radius: 8px; margin-bottom: 24px; border-left: 4px solid #FF9800;">
                    <strong>First Login:</strong> You must change your password to continue.
                </div>
                
                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <input type="password" id="currentPassword" required />
                </div>
                
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="8" />
                    <p class="password-hint">Minimum 8 characters</p>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required minlength="8" />
                </div>
                
                <button type="submit" class="btn btn-primary" id="changePasswordBtn">
                    Change Password & Continue
                </button>
            </form>

            <div class="home-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://soesdipnikhtnuuemstm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const changePasswordForm = document.getElementById('changePasswordForm');
        const errorMessage = document.getElementById('errorMessage');
        const changePasswordError = document.getElementById('changePasswordError');
        const loginBtn = document.getElementById('loginBtn');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        
        let currentUser = null;
        
        // =============================================
        // LOGIN HANDLER
        // =============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                // Call Supabase function to authenticate
                const { data, error } = await supabase.rpc('authenticate_user', {
                    p_username: username,
                    p_password: password
                });
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const user = data[0];
                    currentUser = user;
                    
                    // Log successful login
                    await supabase.rpc('log_login', {
                        p_user_id: user.user_id,
                        p_username: username,
                        p_success: true
                    });
                    
                    // Store user info in session
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('userId', user.user_id);
                    sessionStorage.setItem('username', user.username);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('userName', user.full_name);
                    sessionStorage.setItem('udiseCode', user.udise_code || '');
                    sessionStorage.setItem('schoolName', user.school_name || '');
                    
                    // Check if password change required
                    if (user.must_change_password) {
                        showChangePasswordForm();
                    } else {
                        redirectToDashboard(user.role);
                    }
                } else {
                    showError('Invalid username or password');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
        
        // =============================================
        // CHANGE PASSWORD HANDLER
        // =============================================
        changePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (newPassword.length < 8) {
                showChangePasswordError('Password must be at least 8 characters');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showChangePasswordError('New passwords do not match');
                return;
            }
            
            if (currentPassword === newPassword) {
                showChangePasswordError('New password must be different from current password');
                return;
            }
            
            changePasswordBtn.disabled = true;
            changePasswordBtn.textContent = 'Changing Password...';
            
            try {
                const { data, error } = await supabase.rpc('change_password', {
                    p_user_id: currentUser.user_id,
                    p_old_password: currentPassword,
                    p_new_password: newPassword
                });
                
                if (error) throw error;
                
                if (data === true) {
                    alert('Password changed successfully!');
                    redirectToDashboard(currentUser.role);
                } else {
                    showChangePasswordError('Current password is incorrect');
                    changePasswordBtn.disabled = false;
                    changePasswordBtn.textContent = 'Change Password & Continue';
                }
            } catch (error) {
                console.error('Change password error:', error);
                showChangePasswordError('Failed to change password. Please try again.');
                changePasswordBtn.disabled = false;
                changePasswordBtn.textContent = 'Change Password & Continue';
            }
        });
        
        // =============================================
        // HELPER FUNCTIONS
        // =============================================
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
        
        function showChangePasswordError(message) {
            changePasswordError.textContent = message;
            changePasswordError.classList.add('show');
            setTimeout(() => {
                changePasswordError.classList.remove('show');
            }, 5000);
        }
        
        function showChangePasswordForm() {
            loginForm.style.display = 'none';
            changePasswordForm.classList.add('show');
            document.getElementById('currentPassword').value = document.getElementById('password').value;
        }
        
        function redirectToDashboard(role) {
            if (role === 'admin') {
                window.location.href = 'admin-panel.html';
            } else if (role === 'teacher') {
                window.location.href = 'teacher-space.html';
            } else if (role === 'field_officer') {
                window.location.href = 'field-officer-space.html';
            } else {
                window.location.href = 'index.html';
            }
        }
        
        // Check if already logged in
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const role = sessionStorage.getItem('userRole');
            redirectToDashboard(role);
        }
    </script>
</body>
</html>
