<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c1: #FFEDDB;
            --c2: #EDCDBB;
            --c3: #E3B7A0;
            --c4: #BF9270;
            --c4d: #a87c60;
            --brown: #3A2E25;
            --brown-mid: #6A5445;
            --brown-light: #9A8070;
            --white: #FFFFFF;
            --sh: 0 2px 12px rgba(58,46,37,.08);
            --sh-md: 0 6px 24px rgba(58,46,37,.12);
            --r: 12px;
            --ease: 200ms cubic-bezier(.4,0,.2,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--white); min-height:100vh; }
        ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--c1);} ::-webkit-scrollbar-thumb{background:var(--white);border-radius:3px;}

        .header {
            background: rgba(255,237,219,.96);
            backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(58,46,37,.15);
            padding:0 5%; height:66px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:10;
        }
        .header h1 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:var(--brown); letter-spacing:-.2px; }
        .header-actions { display:flex; gap:10px; }

        .btn { padding:8px 18px; border:none; border-radius:8px; font-size:.83rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all var(--ease); }
        .btn-primary { background:var(--white); color:var(--brown); border:1.5px solid var(--brown); }
        .btn-primary:hover { background:var(--brown); transform:translateY(-1px); box-shadow:0 4px 12px rgba(191,146,112,.28); }
        .btn-secondary { background:var(--c1); color:var(--brown); border:1.5px solid rgba(58,46,37,.3); }
        .btn-secondary:hover { border-color:var(--brown); color:var(--brown); }

        .container { max-width:1400px; margin:0 auto; padding:32px 5%; }

        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
        .stat-card { background:var(--white); padding:20px 24px; border-radius:14px; border:1.5px solid var(--brown); box-shadow:var(--sh); }
        .stat-value { font-family:'Playfair Display',serif; font-size:2.6rem; font-weight:700; color:var(--brown); letter-spacing:-.8px; margin-bottom:3px; }
        .stat-label { font-size:.72rem; color:var(--brown); font-weight:600; text-transform:uppercase; letter-spacing:.7px; }

        .panel { background:var(--white); border-radius:16px; border:1.5px solid var(--brown); box-shadow:var(--sh); padding:24px; margin-bottom:20px; }
        .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:14px; border-bottom:1.5px solid var(--brown); }
        .panel-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--brown); letter-spacing:-.2px; }

        table { width:100%; border-collapse:collapse; }
        th,td { text-align:left; padding:11px 14px; border-bottom:1px solid rgba(58,46,37,.12); }
        th { background:var(--white); font-weight:600; font-size:.75rem; color:var(--brown); text-transform:uppercase; letter-spacing:.5px; }
        th:first-child{border-radius:8px 0 0 8px;} th:last-child{border-radius:0 8px 8px 0;}
        tbody tr { transition:background var(--ease); }
        tbody tr:hover td { background:rgba(58,46,37,.04); }
        tbody tr:nth-child(even) td { background:rgba(58,46,37,.03); }
        tbody tr:nth-child(even):hover td { background:rgba(58,46,37,.06); }
        td { font-size:.83rem; color:var(--brown); }

        .badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:.72rem; font-weight:600; }
        .badge-admin  { background:rgba(191,146,112,.15); color:var(--brown); }
        .badge-teacher{ background:rgba(58,46,37,.08); color:var(--brown); }
        .badge-officer{ background:rgba(227,183,160,.35); color:var(--brown); }
        .badge-active { background:#E8F5EA; color:#1E6B36; }
        .badge-inactive{ background:#FAE8E8; color:#8B2020; }

        .action-btn { padding:5px 11px; margin:0 2px; border:1.5px solid transparent; border-radius:6px; font-size:.75rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all var(--ease); }
        .action-btn-disable{background:#FAE8E8;color:#8B2020;border-color:rgba(139,32,32,.12);}
        .action-btn-disable:hover{background:#8B2020;color:white;}
        .action-btn-enable{background:#E8F5EA;color:#1E6B36;border-color:rgba(30,107,54,.12);}
        .action-btn-enable:hover{background:#1E6B36;color:white;}
        .action-btn-reset{background:rgba(191,146,112,.12);color:var(--brown);border-color:rgba(191,146,112,.22);}
        .action-btn-reset:hover{background:var(--c4);color:white;}

        .modal{display:none;position:fixed;inset:0;background:rgba(58,46,37,.4);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
        .modal.show{display:flex;}
        .modal-content{background:var(--white);border-radius:18px;padding:28px 32px;max-width:520px;width:90%;max-height:88vh;overflow-y:auto;box-shadow:var(--sh-md);border:1.5px solid var(--brown);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1.5px solid var(--brown);}
        .modal-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--brown);}
        .close-btn{background:var(--white);border:1.5px solid var(--brown);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--brown);display:flex;align-items:center;justify-content:center;transition:all var(--ease);}
        .close-btn:hover{background:var(--white);color:var(--brown);}

        .form-group{margin-bottom:16px;}
        label{display:block;margin-bottom:5px;font-size:.8rem;font-weight:600;color:var(--brown);}
        input,select{width:100%;padding:10px 13px;border:1.5px solid rgba(58,46,37,.3);border-radius:var(--r);font-size:.85rem;font-family:'DM Sans',sans-serif;background:var(--c1);color:var(--brown);transition:border-color var(--ease),box-shadow var(--ease);}
        input:focus,select:focus{outline:none;border-color:var(--brown);box-shadow:0 0 0 3px rgba(191,146,112,.12);background:var(--white);}
        .required{color:var(--brown);}

        .success-message,.error-message{padding:10px 14px;border-radius:var(--r);margin-bottom:14px;font-size:.82rem;font-weight:500;display:none;}
        .success-message.show,.error-message.show{display:block;}
        .success-message{background:#E8F5EA;color:#1E6B36;border:1px solid rgba(30,107,54,.12);}
        .error-message{background:#FAE8E8;color:#8B2020;border:1px solid rgba(139,32,32,.12);}

        @media(max-width:768px){.header{padding:0 20px;}.container{padding:20px;}.stats{grid-template-columns:repeat(2,1fr);}}
    </style>
</head>
<body>
    <div class="header">
        <h1>👤 User Management</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTeachers">0</div>
                <div class="stat-label">Teachers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalOfficers">0</div>
                <div class="stat-label">Field Officers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeUsers">0</div>
                <div class="stat-label">Active Users</div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">All Users</h2>
                <button class="btn btn-primary" onclick="loadUsers()">🔄 Refresh</button>
            </div>

            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>

            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>UDISE/ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            Loading users...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New User</h3>
                <button class="close-btn" onclick="closeAddUserModal()">×</button>
            </div>

            <form id="addUserForm">
                <div class="form-group">
                    <label>Username (UDISE for teachers) <span class="required">*</span></label>
                    <input type="text" id="newUsername" required />
                </div>

                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="newFullName" required />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" />
                </div>

                <div class="form-group">
                    <label>Role <span class="required">*</span></label>
                    <select id="newRole" required>
                        <option value="">-- Select Role --</option>
                        <option value="teacher">Teacher</option>
                        <option value="field_officer">Field Officer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group" id="udiseGroup">
                    <label>UDISE Code</label>
                    <input type="text" id="newUdise" />
                </div>

                <div class="form-group" id="schoolGroup">
                    <label>School Name</label>
                    <input type="text" id="newSchool" />
                </div>

                <div class="form-group" id="kaushalGroup" style="display:none;">
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
                        <input type="checkbox" id="newKaushalBodh" style="width:auto;accent-color:var(--brown);">
                        School has Kaushal Bodh (Grade 6–8)
                    </label>
                </div>

                <div class="form-group">
                    <label>Temporary Password <span class="required">*</span></label>
                    <input type="text" id="newPassword" required />
                    <small style="color: #666;">User will be required to change this on first login</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create User
                </button>
            </form>
        </div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://soesdipnikhtnuuemstm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
        
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check authentication
        if (sessionStorage.getItem('loggedIn') !== 'true' || sessionStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }
        
        const currentUserId = sessionStorage.getItem('userId');
        
        // Load users on page load
        loadUsers();
        
        // =============================================
        // LOAD USERS FROM DATABASE
        // =============================================
        async function loadUsers() {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                displayUsers(data);
                updateStats(data);
            } catch (error) {
                console.error('Error loading users:', error);
                showError('Failed to load users');
            }
        }
        
        // =============================================
        // DISPLAY USERS IN TABLE
        // =============================================
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.full_name}</td>
                    <td>
                        <span class="badge badge-${user.role === 'admin' ? 'admin' : user.role === 'teacher' ? 'teacher' : 'officer'}">
                            ${user.role.replace('_', ' ').toUpperCase()}
                        </span>
                    </td>
                    <td>${user.udise_code || '-'}</td>
                    <td>
                        <span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${user.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>${user.last_login ? new Date(user.last_login).toLocaleDateString() : 'Never'}</td>
                    <td>
                        ${user.role !== 'admin' ? `
                            <button class="action-btn ${user.is_active ? 'action-btn-disable' : 'action-btn-enable'}" 
                                    onclick="toggleUserStatus('${user.id}', ${!user.is_active})">
                                ${user.is_active ? 'Disable' : 'Enable'}
                            </button>
                            <button class="action-btn action-btn-reset" onclick="resetPassword('${user.id}', '${user.username}')">
                                Reset
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        // =============================================
        // UPDATE STATISTICS
        // =============================================
        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalTeachers').textContent = users.filter(u => u.role === 'teacher').length;
            document.getElementById('totalOfficers').textContent = users.filter(u => u.role === 'field_officer').length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.is_active).length;
        }
        
        // =============================================
        // ADD USER MODAL
        // =============================================
        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('show');
        }
        
        function closeAddUserModal() {
            document.getElementById('addUserModal').classList.remove('show');
            document.getElementById('addUserForm').reset();
        }
        
        // Show/hide UDISE and School fields based on role
        document.getElementById('newRole').addEventListener('change', (e) => {
            const role = e.target.value;
            const udiseGroup = document.getElementById('udiseGroup');
            const schoolGroup = document.getElementById('schoolGroup');
            
            if (role === 'teacher') {
                udiseGroup.style.display = 'block';
                schoolGroup.style.display = 'block';
                document.getElementById('kaushalGroup').style.display = 'block';
                document.getElementById('newUdise').required = true;
            } else {
                udiseGroup.style.display = 'none';
                schoolGroup.style.display = 'none';
                document.getElementById('kaushalGroup').style.display = 'none';
                document.getElementById('newUdise').required = false;
            }
        });
        
        // =============================================
        // CREATE NEW USER
        // =============================================
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value.trim();
            const fullName = document.getElementById('newFullName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;
            const udise = document.getElementById('newUdise').value.trim();
            const school = document.getElementById('newSchool').value.trim();
            const password = document.getElementById('newPassword').value;
            
            try {
                const { data, error } = await supabaseClient.rpc('create_user_admin', {
                    p_username: username,
                    p_email: email || null,
                    p_password: password,
                    p_role: role,
                    p_full_name: fullName,
                    p_udise_code: udise || null,
                    p_school_name: school || null,
                    p_created_by: currentUserId,
                    p_has_kaushal_bodh: hasKaushalBodh
                });
                
                if (error) throw error;
                
                showSuccess(`User ${username} created successfully!`);
                closeAddUserModal();
                loadUsers();
            } catch (error) {
                console.error('Error creating user:', error);
                showError('Failed to create user. Username might already exist.');
            }
        });
        
        // =============================================
        // TOGGLE USER STATUS
        // =============================================
        async function toggleUserStatus(userId, newStatus) {
            if (!confirm(`Are you sure you want to ${newStatus ? 'enable' : 'disable'} this user?`)) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ is_active: newStatus })
                    .eq('id', userId);
                
                if (error) throw error;
                
                showSuccess(`User ${newStatus ? 'enabled' : 'disabled'} successfully!`);
                loadUsers();
            } catch (error) {
                console.error('Error toggling user status:', error);
                showError('Failed to update user status');
            }
        }
        
        // =============================================
        // RESET PASSWORD
        // =============================================
        async function resetPassword(userId, username) {
            const newPassword = prompt(`Enter new temporary password for ${username}:`);
            
            if (!newPassword) return;
            
            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            try {
                const { error } = await supabaseClient.rpc('reset_user_password', {
                    p_user_id: userId,
                    p_new_password: newPassword
                });
                
                if (error) throw error;
                
                showSuccess(`Password reset for ${username}. New password: ${newPassword}`);
            } catch (error) {
                console.error('Error resetting password:', error);
                showError('Failed to reset password');
            }
        }
        
        // =============================================
        // HELPER FUNCTIONS
        // =============================================
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
