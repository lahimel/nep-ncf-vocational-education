<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-cyan: #9ECAD6;
            --primary-slate: #748DAE;
            --primary-rose: #F5CBCB;
            --primary-blush: #FFEAEA;
            --text-dark: #3A4F5C;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, var(--primary-blush) 0%, #FFF 30%, var(--primary-blush) 100%);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary-slate) 0%, var(--primary-cyan) 100%);
            color: white;
            padding: 24px 40px;
            box-shadow: 0 4px 24px rgba(116, 141, 174, .25);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all .3s;
        }
        
        .btn-primary {
            background: white;
            color: var(--primary-slate);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,0,0,.2);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,.2);
            color: white;
            border: 1px solid rgba(255,255,255,.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,.3);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(116, 141, 174, .15);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-slate);
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .panel {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(116, 141, 174, .15);
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .panel-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #E8EEF2;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-cyan);
        }
        
        .required {
            color: #C33;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #EEE;
        }
        
        th {
            background: #F8FAFB;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        tr:hover {
            background: #F8FAFB;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-admin {
            background: #E3F2FD;
            color: #1976D2;
        }
        
        .badge-teacher {
            background: #F3E5F5;
            color: #7B1FA2;
        }
        
        .badge-officer {
            background: #E8F5E9;
            color: #388E3C;
        }
        
        .badge-active {
            background: #E8F5E9;
            color: #2E7D32;
        }
        
        .badge-inactive {
            background: #FFEBEE;
            color: #C62828;
        }
        
        .action-btn {
            padding: 6px 12px;
            margin: 0 4px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        
        .action-btn-disable {
            background: #FFEBEE;
            color: #C62828;
        }
        
        .action-btn-enable {
            background: #E8F5E9;
            color: #2E7D32;
        }
        
        .action-btn-reset {
            background: #FFF3E0;
            color: #E65100;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .success-message, .error-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #E8F5E9;
            color: #2E7D32;
        }
        
        .error-message {
            background: #FFEBEE;
            color: #C62828;
        }
        
        .success-message.show, .error-message.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👤 User Management</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="showAddUserModal()">+ Add User</button>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTeachers">0</div>
                <div class="stat-label">Teachers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalOfficers">0</div>
                <div class="stat-label">Field Officers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeUsers">0</div>
                <div class="stat-label">Active Users</div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">All Users</h2>
                <button class="btn btn-primary" onclick="loadUsers()">🔄 Refresh</button>
            </div>

            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="errorMessage"></div>

            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>UDISE/ID</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            Loading users...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New User</h3>
                <button class="close-btn" onclick="closeAddUserModal()">×</button>
            </div>

            <form id="addUserForm">
                <div class="form-group">
                    <label>Username (UDISE for teachers) <span class="required">*</span></label>
                    <input type="text" id="newUsername" required />
                </div>

                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="newFullName" required />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" />
                </div>

                <div class="form-group">
                    <label>Role <span class="required">*</span></label>
                    <select id="newRole" required>
                        <option value="">-- Select Role --</option>
                        <option value="teacher">Teacher</option>
                        <option value="field_officer">Field Officer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group" id="udiseGroup">
                    <label>UDISE Code</label>
                    <input type="text" id="newUdise" />
                </div>

                <div class="form-group" id="schoolGroup">
                    <label>School Name</label>
                    <input type="text" id="newSchool" />
                </div>

                <div class="form-group">
                    <label>Temporary Password <span class="required">*</span></label>
                    <input type="text" id="newPassword" required />
                    <small style="color: #666;">User will be required to change this on first login</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create User
                </button>
            </form>
        </div>
    </div>

    <script>
        // =============================================
        // SUPABASE CONFIGURATION
        // =============================================
        const SUPABASE_URL = 'https://soesdipnikhtnuuemstm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check authentication
        if (sessionStorage.getItem('loggedIn') !== 'true' || sessionStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }
        
        const currentUserId = sessionStorage.getItem('userId');
        
        // Load users on page load
        loadUsers();
        
        // =============================================
        // LOAD USERS FROM DATABASE
        // =============================================
        async function loadUsers() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                displayUsers(data);
                updateStats(data);
            } catch (error) {
                console.error('Error loading users:', error);
                showError('Failed to load users');
            }
        }
        
        // =============================================
        // DISPLAY USERS IN TABLE
        // =============================================
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.full_name}</td>
                    <td>
                        <span class="badge badge-${user.role === 'admin' ? 'admin' : user.role === 'teacher' ? 'teacher' : 'officer'}">
                            ${user.role.replace('_', ' ').toUpperCase()}
                        </span>
                    </td>
                    <td>${user.udise_code || '-'}</td>
                    <td>
                        <span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${user.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>${user.last_login ? new Date(user.last_login).toLocaleDateString() : 'Never'}</td>
                    <td>
                        ${user.role !== 'admin' ? `
                            <button class="action-btn ${user.is_active ? 'action-btn-disable' : 'action-btn-enable'}" 
                                    onclick="toggleUserStatus('${user.id}', ${!user.is_active})">
                                ${user.is_active ? 'Disable' : 'Enable'}
                            </button>
                            <button class="action-btn action-btn-reset" onclick="resetPassword('${user.id}', '${user.username}')">
                                Reset
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        // =============================================
        // UPDATE STATISTICS
        // =============================================
        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalTeachers').textContent = users.filter(u => u.role === 'teacher').length;
            document.getElementById('totalOfficers').textContent = users.filter(u => u.role === 'field_officer').length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.is_active).length;
        }
        
        // =============================================
        // ADD USER MODAL
        // =============================================
        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('show');
        }
        
        function closeAddUserModal() {
            document.getElementById('addUserModal').classList.remove('show');
            document.getElementById('addUserForm').reset();
        }
        
        // Show/hide UDISE and School fields based on role
        document.getElementById('newRole').addEventListener('change', (e) => {
            const role = e.target.value;
            const udiseGroup = document.getElementById('udiseGroup');
            const schoolGroup = document.getElementById('schoolGroup');
            
            if (role === 'teacher') {
                udiseGroup.style.display = 'block';
                schoolGroup.style.display = 'block';
                document.getElementById('newUdise').required = true;
            } else {
                udiseGroup.style.display = 'none';
                schoolGroup.style.display = 'none';
                document.getElementById('newUdise').required = false;
            }
        });
        
        // =============================================
        // CREATE NEW USER
        // =============================================
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value.trim();
            const fullName = document.getElementById('newFullName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;
            const udise = document.getElementById('newUdise').value.trim();
            const school = document.getElementById('newSchool').value.trim();
            const password = document.getElementById('newPassword').value;
            
            try {
                const { data, error } = await supabase.rpc('create_user_admin', {
                    p_username: username,
                    p_email: email || null,
                    p_password: password,
                    p_role: role,
                    p_full_name: fullName,
                    p_udise_code: udise || null,
                    p_school_name: school || null,
                    p_created_by: currentUserId
                });
                
                if (error) throw error;
                
                showSuccess(`User ${username} created successfully!`);
                closeAddUserModal();
                loadUsers();
            } catch (error) {
                console.error('Error creating user:', error);
                showError('Failed to create user. Username might already exist.');
            }
        });
        
        // =============================================
        // TOGGLE USER STATUS
        // =============================================
        async function toggleUserStatus(userId, newStatus) {
            if (!confirm(`Are you sure you want to ${newStatus ? 'enable' : 'disable'} this user?`)) {
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('users')
                    .update({ is_active: newStatus })
                    .eq('id', userId);
                
                if (error) throw error;
                
                showSuccess(`User ${newStatus ? 'enabled' : 'disabled'} successfully!`);
                loadUsers();
            } catch (error) {
                console.error('Error toggling user status:', error);
                showError('Failed to update user status');
            }
        }
        
        // =============================================
        // RESET PASSWORD
        // =============================================
        async function resetPassword(userId, username) {
            const newPassword = prompt(`Enter new temporary password for ${username}:`);
            
            if (!newPassword) return;
            
            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }
            
            try {
                const { error } = await supabase.rpc('reset_user_password', {
                    p_user_id: userId,
                    p_new_password: newPassword
                });
                
                if (error) throw error;
                
                showSuccess(`Password reset for ${username}. New password: ${newPassword}`);
            } catch (error) {
                console.error('Error resetting password:', error);
                showError('Failed to reset password');
            }
        }
        
        // =============================================
        // HELPER FUNCTIONS
        // =============================================
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
