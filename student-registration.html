<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cyan:  #9ECAD6;
            --slate: #748DAE;
            --blush: #FFEAEA;
            --dark:  #3A4F5C;
            --mid:   #5A6F7C;
            --border:#E0E0E0;
            --header-bg: #F8F9FA;
            --row-hover: #F0F7FF;
            --selected: #E8F0FE;
            --green: #34A853;
            --blue:  #1A73E8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #F5F5F5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOP BAR (like Google Sheets top) ── */
        .topbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 56px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--mid);
            font-size: 20px;
            padding: 6px;
            border-radius: 50%;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: background .15s;
        }
        .back-btn:hover { background: #F0F0F0; }

        .sheet-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--slate), var(--cyan));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .doc-info { flex: 1; min-width: 0; }
        .doc-title { font-size: 17px; font-weight: 600; color: #202124; }
        .doc-sub   { font-size: 11px; color: #5F6368; }

        .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

        .tb-btn {
            padding: 7px 16px;
            border-radius: 4px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tb-btn-save {
            background: var(--blue);
            color: white;
        }
        .tb-btn-save:hover { background: #1558B0; }
        .tb-btn-save:disabled { background: #AAB; cursor: not-allowed; }

        .tb-btn-outline {
            background: white;
            color: var(--dark);
            border: 1px solid var(--border);
        }
        .tb-btn-outline:hover { background: #F0F0F0; }

        .logout-link {
            font-size: 13px;
            color: #C62828;
            cursor: pointer;
            padding: 7px 12px;
            border-radius: 4px;
        }
        .logout-link:hover { background: #FFEBEE; }

        /* ── MENU BAR (like Google Sheets menus) ── */
        .menubar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 60px;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 36px;
            flex-shrink: 0;
        }

        .menu-item {
            padding: 4px 12px;
            font-size: 13px;
            color: #3C4043;
            cursor: pointer;
            border-radius: 4px;
            white-space: nowrap;
        }
        .menu-item:hover { background: #F0F0F0; }

        /* ── SHEET TABS (bottom Google Sheets style) ── */
        .sheet-bottom {
            background: #F8F9FA;
            border-top: 1px solid var(--border);
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 2px;
            height: 40px;
            flex-shrink: 0;
            order: 3;
        }

        .add-sheet-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #5F6368;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .add-sheet-btn:hover { background: #E8EAED; }

        .sheet-tab {
            padding: 0 20px;
            height: 32px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            background: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            color: #3C4043;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .15s;
            position: relative;
            bottom: -1px;
        }

        .sheet-tab:hover { background: #E8EAED; }

        .sheet-tab.active {
            background: white;
            border-color: var(--border);
            color: var(--blue);
            font-weight: 600;
            border-bottom-color: white;
        }

        .tab-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* ── FORMULA BAR ── */
        .formula-bar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 34px;
            flex-shrink: 0;
        }

        .cell-ref {
            width: 80px;
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 2px 6px;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
            text-align: center;
        }

        .formula-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .formula-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
        }

        /* ── SPREADSHEET AREA ── */
        .sheet-area {
            flex: 1;
            overflow: auto;
            background: white;
            order: 2;
        }

        /* ── THE GRID ── */
        .grid-wrapper {
            min-width: max-content;
        }

        table.grid {
            border-collapse: collapse;
            table-layout: fixed;
        }

        /* Row number column */
        .grid th.row-num, .grid td.row-num {
            width: 46px;
            min-width: 46px;
            background: #F8F9FA;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            text-align: center;
            font-size: 12px;
            color: #5F6368;
            font-weight: 400;
            padding: 0;
            user-select: none;
            position: sticky;
            left: 0;
            z-index: 2;
        }

        /* Column headers */
        .grid thead th {
            background: #F8F9FA;
            border-right: 1px solid var(--border);
            border-bottom: 2px solid #BDBDBD;
            font-size: 12px;
            font-weight: 600;
            color: #3C4043;
            padding: 6px 8px;
            text-align: left;
            white-space: nowrap;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .grid thead th.required-col::after {
            content: ' *';
            color: #C62828;
        }

        /* Data cells */
        .grid td {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 0;
            height: 26px;
            vertical-align: middle;
        }

        .grid td.selected {
            background: var(--selected);
            outline: 2px solid var(--blue);
            outline-offset: -2px;
        }

        .grid td input, .grid td select {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            padding: 0 6px;
            background: transparent;
            color: #202124;
        }

        .grid td select { cursor: pointer; background: white; }

        .grid td:hover { background: var(--row-hover); }
        .grid td input:focus, .grid td select:focus {
            background: white;
            outline: 2px solid var(--blue);
            outline-offset: -2px;
        }

        /* Alternating row color */
        .grid tbody tr:nth-child(even) td:not(.row-num) {
            background: #FAFAFA;
        }
        .grid tbody tr:nth-child(even) td input {
            background: transparent;
        }
        .grid tbody tr:nth-child(even) td:hover { background: var(--row-hover); }

        /* Column widths */
        .col-srno   { width: 60px;  min-width: 60px; }
        .col-fname  { width: 140px; min-width: 120px; }
        .col-mname  { width: 130px; min-width: 100px; }
        .col-lname  { width: 140px; min-width: 120px; }
        .col-full   { width: 220px; min-width: 180px; }
        .col-gender { width: 90px;  min-width: 80px; }
        .col-mother { width: 130px; min-width: 100px; }
        .col-father { width: 130px; min-width: 100px; }
        .col-dob    { width: 130px; min-width: 110px; }

        /* Status bar */
        .status-bar {
            background: #F8F9FA;
            border-top: 1px solid var(--border);
            padding: 3px 12px;
            font-size: 12px;
            color: #5F6368;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-shrink: 0;
            order: 4;
        }

        .status-saved   { color: var(--green); font-weight: 500; }
        .status-unsaved { color: #E65100; font-weight: 500; }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #323232;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 13px;
            opacity: 0;
            transition: all .3s;
            z-index: 100;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--green); }
        .toast.error   { background: #D32F2F; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            display: none;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #EEE;
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TOP BAR -->
<div class="topbar">
    <a href="teacher-space.html" class="back-btn" title="Back">←</a>
    <div class="sheet-icon">👨‍🎓</div>
    <div class="doc-info">
        <div class="doc-title" id="docTitle">Student Registration</div>
        <div class="doc-sub" id="docSub">Loading...</div>
    </div>
    <div class="topbar-actions">
        <button class="tb-btn tb-btn-outline" onclick="addRow()">+ Add Row</button>
        <button class="tb-btn tb-btn-outline" onclick="deleteSelectedRow()">🗑 Delete Row</button>
        <button class="tb-btn tb-btn-save" id="saveBtn" onclick="saveSheet()">💾 Save</button>
        <span class="logout-link" onclick="logout()">Logout</span>
    </div>
</div>

<!-- MENU BAR -->
<div class="menubar">
    <span class="menu-item" onclick="addRow()">Insert Row</span>
    <span class="menu-item" onclick="clearSheet()">Clear Sheet</span>
    <span class="menu-item" onclick="exportCSV()">Export CSV</span>
    <span class="menu-item" onclick="pasteHelp()">Paste from Excel</span>
</div>

<!-- FORMULA BAR -->
<div class="formula-bar">
    <input class="cell-ref" id="cellRef" value="A1" readonly>
    <div class="formula-divider"></div>
    <input class="formula-input" id="formulaBar" placeholder="Click a cell to edit..." readonly>
</div>

<!-- SPREADSHEET -->
<div class="sheet-area" id="sheetArea">
    <div class="grid-wrapper">
        <table class="grid" id="mainGrid">
            <thead>
                <tr>
                    <th class="row-num">⠿</th>
                    <th class="col-srno">Sr No</th>
                    <th class="col-fname required-col">First Name</th>
                    <th class="col-mname">Middle Name</th>
                    <th class="col-lname required-col">Last Name</th>
                    <th class="col-full">Full Name</th>
                    <th class="col-gender">Gender</th>
                    <th class="col-mother">Mother Name</th>
                    <th class="col-father">Father Name</th>
                    <th class="col-dob">Date of Birth</th>
                </tr>
            </thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<!-- SHEET TABS -->
<div class="sheet-bottom">
    <button class="add-sheet-btn" title="Add grade" disabled>+</button>
    <button class="sheet-tab active" id="tab6" onclick="switchGrade(6)">
        <span class="tab-dot" style="background:#4285F4"></span> Grade 6
    </button>
    <button class="sheet-tab" id="tab7" onclick="switchGrade(7)">
        <span class="tab-dot" style="background:#34A853"></span> Grade 7
    </button>
    <button class="sheet-tab" id="tab8" onclick="switchGrade(8)">
        <span class="tab-dot" style="background:#FBBC04"></span> Grade 8
    </button>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
    <span id="statusText">Ready</span>
    <span id="rowCountText"></span>
    <span id="saveStatus"></span>
</div>

<script>
    // ─────────────────────────────
    // SUPABASE
    // ─────────────────────────────
    const SUPABASE_URL      = 'https://soesdipnikhtnuuemstm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─────────────────────────────
    // AUTH
    // ─────────────────────────────
    if (sessionStorage.getItem('loggedIn') !== 'true') window.location.href = 'login.html';
    const USERNAME    = sessionStorage.getItem('username')   || '';
    const SCHOOL_NAME = sessionStorage.getItem('schoolName') || '';

    document.getElementById('docTitle').textContent = SCHOOL_NAME || 'Student Registration';
    document.getElementById('docSub').textContent   = 'UDISE: ' + USERNAME + ' · Students (Grade 6-8)';

    // ─────────────────────────────
    // STATE
    // ─────────────────────────────
    let currentGrade  = 6;
    let gradeData     = { 6: [], 7: [], 8: [] };  // rows per grade
    let selectedRow   = null;
    let unsaved       = false;

    const COLS = ['sr_no','first_name','middle_name','last_name','full_name','gender','mother_name','father_name','date_of_birth'];
    const DEFAULT_ROWS = 30;

    // ─────────────────────────────
    // INIT
    // ─────────────────────────────
    (async function init() {
        showLoading(true);
        try {
            const { data, error } = await sb
                .from('students')
                .select('*')
                .eq('udise_code', USERNAME)
                .order('grade').order('sr_no');

            if (error) throw error;

            // Distribute into grade buckets
            [6, 7, 8].forEach(g => {
                gradeData[g] = (data || [])
                    .filter(r => String(r.grade) === String(g))
                    .map(r => ({
                        id:            r.id,
                        sr_no:         r.sr_no || '',
                        first_name:    r.first_name || '',
                        middle_name:   r.middle_name || '',
                        last_name:     r.last_name || '',
                        full_name:     r.full_name || '',
                        gender:        r.gender || '',
                        mother_name:   r.mother_name || '',
                        father_name:   r.father_name || '',
                        date_of_birth: r.date_of_birth || ''
                    }));
            });

            renderGrid(currentGrade);
        } catch (e) {
            toast('Could not load data: ' + e.message, 'error');
        } finally {
            showLoading(false);
        }
    })();

    // ─────────────────────────────
    // RENDER GRID
    // ─────────────────────────────
    function renderGrid(grade) {
        const rows = gradeData[grade];
        // Pad to at least DEFAULT_ROWS
        const total = Math.max(rows.length + 5, DEFAULT_ROWS);
        const body  = document.getElementById('gridBody');
        body.innerHTML = '';

        for (let i = 0; i < total; i++) {
            const r = rows[i] || {};
            body.appendChild(makeRow(i, r));
        }

        updateStatus();
        setSaveStatus(false);
    }

    // ─────────────────────────────
    // MAKE A GRID ROW
    // ─────────────────────────────
    function makeRow(idx, data) {
        const tr = document.createElement('tr');
        tr.dataset.idx = idx;

        // Row number
        const num = document.createElement('td');
        num.className = 'row-num';
        num.textContent = idx + 1;
        num.onclick = () => selectRow(idx);
        tr.appendChild(num);

        // Sr No
        tr.appendChild(makeCell(idx, 'sr_no', data.sr_no || (idx + 1), 'number'));

        // First Name
        tr.appendChild(makeCell(idx, 'first_name', data.first_name || '', 'text'));

        // Middle Name
        tr.appendChild(makeCell(idx, 'middle_name', data.middle_name || '', 'text'));

        // Last Name
        tr.appendChild(makeCell(idx, 'last_name', data.last_name || '', 'text'));

        // Full Name (auto-filled)
        tr.appendChild(makeCell(idx, 'full_name', data.full_name || '', 'text'));

        // Gender (dropdown)
        tr.appendChild(makeGenderCell(idx, data.gender || ''));

        // Mother Name
        tr.appendChild(makeCell(idx, 'mother_name', data.mother_name || '', 'text'));

        // Father Name
        tr.appendChild(makeCell(idx, 'father_name', data.father_name || '', 'text'));

        // Date of Birth
        tr.appendChild(makeCell(idx, 'date_of_birth', data.date_of_birth || '', 'text', 'DD/MM/YYYY'));

        return tr;
    }

    function makeCell(idx, field, value, type, placeholder) {
        const td  = document.createElement('td');
        const inp = document.createElement('input');
        inp.type        = 'text';
        inp.value       = value;
        inp.placeholder = placeholder || '';
        inp.dataset.field = field;
        inp.dataset.idx   = idx;

        inp.onfocus = () => {
            selectRow(idx);
            document.getElementById('cellRef').value    = colLetter(field) + (idx + 1);
            document.getElementById('formulaBar').value = inp.value;
        };

        inp.oninput = () => {
            setCell(idx, field, inp.value);
            document.getElementById('formulaBar').value = inp.value;
            // Auto-fill Full Name
            if (['first_name','middle_name','last_name'].includes(field)) {
                autoFillFullName(idx);
            }
            markUnsaved();
        };

        // Support paste from Excel (Tab-separated)
        inp.onpaste = (e) => {
            const text = (e.clipboardData || window.clipboardData).getData('text');
            if (text.includes('\t') || text.includes('\n')) {
                e.preventDefault();
                handleGridPaste(idx, field, text);
            }
        };

        inp.onkeydown = (e) => handleKeyNav(e, idx, field);

        td.appendChild(inp);
        return td;
    }

    function makeGenderCell(idx, value) {
        const td  = document.createElement('td');
        const sel = document.createElement('select');
        sel.dataset.field = 'gender';
        sel.dataset.idx   = idx;

        ['','Male','Female','Other'].forEach(opt => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt || '— select —';
            if (opt === value) o.selected = true;
            sel.appendChild(o);
        });

        sel.onchange = () => { setCell(idx, 'gender', sel.value); markUnsaved(); };
        sel.onfocus  = () => selectRow(idx);
        td.appendChild(sel);
        return td;
    }

    // ─────────────────────────────
    // AUTO-FILL FULL NAME
    // ─────────────────────────────
    function autoFillFullName(idx) {
        const row = gradeData[currentGrade][idx];
        if (!row) return;
        const full = [row.first_name, row.middle_name, row.last_name].filter(Boolean).join(' ').toUpperCase();
        setCell(idx, 'full_name', full);
        // Update the DOM input
        const inp = document.querySelector(`input[data-idx="${idx}"][data-field="full_name"]`);
        if (inp) inp.value = full;
    }

    // ─────────────────────────────
    // SET CELL VALUE IN STATE
    // ─────────────────────────────
    function setCell(idx, field, value) {
        if (!gradeData[currentGrade][idx]) {
            gradeData[currentGrade][idx] = {};
        }
        gradeData[currentGrade][idx][field] = value;
    }

    // ─────────────────────────────
    // PASTE FROM EXCEL (multi-cell)
    // ─────────────────────────────
    function handleGridPaste(startRow, startField, text) {
        const lines     = text.trim().split('\n');
        const fieldOrder = COLS;
        const startCol   = fieldOrder.indexOf(startField);

        lines.forEach((line, rowOffset) => {
            const cells = line.split('\t');
            cells.forEach((val, colOffset) => {
                const colIdx = startCol + colOffset;
                const rowIdx = startRow + rowOffset;
                if (colIdx >= fieldOrder.length) return;
                const field = fieldOrder[colIdx];
                setCell(rowIdx, field, val.trim());

                // Update DOM
                const inp = document.querySelector(`input[data-idx="${rowIdx}"][data-field="${field}"]`);
                if (inp) inp.value = val.trim();
                const sel = document.querySelector(`select[data-idx="${rowIdx}"][data-field="${field}"]`);
                if (sel) sel.value = val.trim();

                // Auto-fill full name if name columns pasted
                if (['first_name','middle_name','last_name'].includes(field)) {
                    autoFillFullName(rowIdx);
                }
            });
        });

        // Add more rows if needed
        const lastRowNeeded = startRow + lines.length;
        ensureRows(lastRowNeeded + 5);
        markUnsaved();
        toast(`Pasted ${lines.length} row(s)`, 'success');
    }

    function ensureRows(count) {
        const body = document.getElementById('gridBody');
        while (body.rows.length < count) {
            const idx = body.rows.length;
            body.appendChild(makeRow(idx, {}));
        }
    }

    // ─────────────────────────────
    // KEYBOARD NAVIGATION
    // ─────────────────────────────
    function handleKeyNav(e, idx, field) {
        const fieldOrder = COLS;
        const colIdx     = fieldOrder.indexOf(field);

        if (e.key === 'Tab') {
            e.preventDefault();
            const nextCol = e.shiftKey ? colIdx - 1 : colIdx + 1;
            if (nextCol >= 0 && nextCol < fieldOrder.length) {
                focusCell(idx, fieldOrder[nextCol]);
            } else if (!e.shiftKey && colIdx === fieldOrder.length - 1) {
                ensureRows(idx + 2);
                focusCell(idx + 1, fieldOrder[0]);
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            ensureRows(idx + 2);
            focusCell(idx + 1, field);
        } else if (e.key === 'ArrowDown') {
            ensureRows(idx + 2);
            focusCell(idx + 1, field);
        } else if (e.key === 'ArrowUp' && idx > 0) {
            focusCell(idx - 1, field);
        }
    }

    function focusCell(idx, field) {
        const inp = document.querySelector(`input[data-idx="${idx}"][data-field="${field}"]`);
        if (inp) { inp.focus(); inp.select(); }
        const sel = document.querySelector(`select[data-idx="${idx}"][data-field="${field}"]`);
        if (sel) sel.focus();
    }

    // ─────────────────────────────
    // ROW SELECTION
    // ─────────────────────────────
    function selectRow(idx) {
        selectedRow = idx;
        document.querySelectorAll('.grid tbody tr').forEach((tr, i) => {
            tr.querySelector('.row-num').style.background =
                i === idx ? '#E8F0FE' : '';
        });
    }

    // ─────────────────────────────
    // ADD / DELETE ROWS
    // ─────────────────────────────
    function addRow() {
        const body = document.getElementById('gridBody');
        const idx  = body.rows.length;
        body.appendChild(makeRow(idx, {}));
        focusCell(idx, 'sr_no');
        updateStatus();
    }

    function deleteSelectedRow() {
        if (selectedRow === null) { toast('Click on a row number to select it first'); return; }
        const idx = selectedRow;
        gradeData[currentGrade].splice(idx, 1);
        renderGrid(currentGrade);
        markUnsaved();
        toast('Row deleted');
        selectedRow = null;
    }

    function clearSheet() {
        if (!confirm(`Clear ALL students in Grade ${currentGrade}? This cannot be undone.`)) return;
        gradeData[currentGrade] = [];
        renderGrid(currentGrade);
        markUnsaved();
    }

    // ─────────────────────────────
    // SWITCH GRADE TAB
    // ─────────────────────────────
    async function switchGrade(grade) {
        if (unsaved) {
            if (!confirm('You have unsaved changes. Save before switching?')) {
                // Switch without saving
            } else {
                await saveSheet();
            }
        }
        currentGrade = grade;
        [6, 7, 8].forEach(g => {
            document.getElementById('tab' + g).classList.toggle('active', g === grade);
        });
        renderGrid(grade);
    }

    // ─────────────────────────────
    // SAVE
    // ─────────────────────────────
    async function saveSheet() {
        showLoading(true);
        document.getElementById('saveBtn').disabled = true;

        try {
            // Collect non-empty rows from current grade
            const rows = collectRows();

            if (rows.length === 0) {
                toast('Nothing to save — add some students first!');
                return;
            }

            // Delete existing records for this grade+UDISE
            const { error: delErr } = await sb
                .from('students')
                .delete()
                .eq('udise_code', USERNAME)
                .eq('grade', String(currentGrade));

            if (delErr) throw delErr;

            // Insert new records
            const toInsert = rows.map((r, i) => ({
                udise_code:    USERNAME,
                school_name:   SCHOOL_NAME,
                grade:         String(currentGrade),
                sr_no:         parseInt(r.sr_no) || (i + 1),
                first_name:    r.first_name || '',
                middle_name:   r.middle_name || '',
                last_name:     r.last_name || '',
                full_name:     r.full_name || [r.first_name, r.middle_name, r.last_name].filter(Boolean).join(' '),
                gender:        r.gender || '',
                mother_name:   r.mother_name || '',
                father_name:   r.father_name || '',
                date_of_birth: r.date_of_birth || ''
            }));

            const { error: insErr } = await sb.from('students').insert(toInsert);
            if (insErr) throw insErr;

            // Update local state
            gradeData[currentGrade] = rows;

            setSaveStatus(true);
            markUnsaved(false);
            toast(`✅ Saved ${rows.length} students for Grade ${currentGrade}`, 'success');

        } catch (e) {
            toast('Save failed: ' + e.message, 'error');
        } finally {
            showLoading(false);
            document.getElementById('saveBtn').disabled = false;
        }
    }

    // Collect non-empty rows from the DOM
    function collectRows() {
        const body = document.getElementById('gridBody');
        const rows = [];

        Array.from(body.rows).forEach((tr, idx) => {
            const row = {};
            COLS.forEach(field => {
                const inp = tr.querySelector(`input[data-field="${field}"]`);
                const sel = tr.querySelector(`select[data-field="${field}"]`);
                row[field] = (inp ? inp.value : sel ? sel.value : '').trim();
            });
            // Only save if at least a first name exists
            if (row.first_name || row.full_name) rows.push(row);
        });

        return rows;
    }

    // ─────────────────────────────
    // EXPORT CSV
    // ─────────────────────────────
    function exportCSV() {
        const rows = collectRows();
        if (rows.length === 0) { toast('No data to export'); return; }

        const headers = ['Sr No','First Name','Middle Name','Last Name','Full Name','Gender','Mother Name','Father Name','Date of Birth','Grade','School','UDISE'];
        const csvRows = rows.map(r => [
            r.sr_no, r.first_name, r.middle_name, r.last_name,
            r.full_name, r.gender, r.mother_name, r.father_name,
            r.date_of_birth, currentGrade, SCHOOL_NAME, USERNAME
        ].map(v => `"${(v||'').replace(/"/g,'""')}"`));

        const csv  = [headers, ...csvRows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `${SCHOOL_NAME}_Grade${currentGrade}_students.csv`;
        a.click();
        toast('CSV downloaded!', 'success');
    }

    // ─────────────────────────────
    // PASTE HELP
    // ─────────────────────────────
    function pasteHelp() {
        alert('📋 How to paste from Excel:\n\n1. Open your Excel file (Grade_6, Grade_7, Grade_8 sheet)\n2. Select the data rows (from Sr No column to Date of Birth column)\n3. Press Ctrl+C to copy\n4. Click on the first cell (Sr No column, Row 1) in the grid\n5. Press Ctrl+V to paste\n\nData will fill in automatically!');
    }

    // ─────────────────────────────
    // HELPERS
    // ─────────────────────────────
    function colLetter(field) {
        const map = { sr_no:'A', first_name:'B', middle_name:'C', last_name:'D', full_name:'E', gender:'F', mother_name:'G', father_name:'H', date_of_birth:'I' };
        return map[field] || 'A';
    }

    function markUnsaved(state = true) {
        unsaved = state;
        setSaveStatus(!state);
    }

    function setSaveStatus(saved) {
        const el = document.getElementById('saveStatus');
        if (saved) {
            el.className = 'status-saved';
            el.textContent = '✓ All changes saved';
        } else if (unsaved) {
            el.className = 'status-unsaved';
            el.textContent = '● Unsaved changes';
        } else {
            el.textContent = '';
        }
    }

    function updateStatus() {
        const rows = collectRows();
        document.getElementById('statusText').textContent = `Grade ${currentGrade}`;
        document.getElementById('rowCountText').textContent = `${rows.length} students`;
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').classList.toggle('show', show);
    }

    function toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className   = 'toast show ' + type;
        setTimeout(() => { el.className = 'toast'; }, 3000);
    }

    function logout() {
        if (confirm('Logout?')) { sessionStorage.clear(); window.location.href = 'login.html'; }
    }

    // Warn before leaving with unsaved changes
    window.onbeforeunload = (e) => {
        if (unsaved) { e.preventDefault(); e.returnValue = ''; }
    };
</script>
</body>
</html>
