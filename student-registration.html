<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --c1: #FFEDDB;
            --c2: #EDCDBB;
            --c3: #E3B7A0;
            --c4: #BF9270;
            --c4d: #a87c60;
            --brown: #3A2E25;
            --brown-mid: #6A5445;
            --brown-light: #9A8070;
            --white: #FFFFFF;
            --sh: 0 2px 12px rgba(58,46,37,.08);
            --sh-md: 0 6px 24px rgba(58,46,37,.12);
            --r: 12px;
            --ease: 200ms cubic-bezier(.4,0,.2,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--white); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        ::-webkit-scrollbar{width:7px;height:7px;} ::-webkit-scrollbar-track{background:var(--c1);} ::-webkit-scrollbar-thumb{background:var(--white);border-radius:3px;} ::-webkit-scrollbar-corner{background:var(--c1);}

        .topbar { background:var(--white); border-bottom:1.5px solid var(--brown); padding:0 16px; display:flex; align-items:center; gap:12px; height:58px; flex-shrink:0; }
        .back-btn { background:none; border:none; cursor:pointer; color:var(--brown); font-size:18px; padding:6px 8px; border-radius:8px; text-decoration:none; display:flex; align-items:center; transition:background var(--ease),color var(--ease); }
        .back-btn:hover { background:var(--white); color:var(--brown); }
        .doc-info { flex:1; min-width:0; }
        .doc-title { font-family:'Playfair Display',serif; font-size:.95rem; font-weight:700; color:var(--brown); letter-spacing:-.1px; }
        .doc-sub { font-size:.72rem; color:var(--brown); }
        .topbar-actions { display:flex; align-items:center; gap:8px; margin-left:auto; }
        .tb-btn { padding:7px 14px; border-radius:8px; border:none; font-family:'DM Sans',sans-serif; font-size:.82rem; cursor:pointer; font-weight:600; transition:all var(--ease); display:flex; align-items:center; gap:5px; }
        .tb-btn-save { background:var(--white); color:var(--brown); border:1.5px solid var(--brown); }
        .tb-btn-save:hover { background:var(--brown); color:var(--white); box-shadow:0 3px 10px rgba(58,46,37,.2); }
        .tb-btn-save:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }
        .tb-btn-outline { background:var(--white); color:var(--brown); border:1.5px solid rgba(58,46,37,.35); }
        .tb-btn-outline:hover { border-color:var(--brown); background:rgba(58,46,37,.05); }
        .logout-link { font-size:.82rem; color:var(--brown); cursor:pointer; padding:6px 10px; border-radius:8px; font-weight:500; transition:all var(--ease); }
        .logout-link:hover { color:var(--brown); background:rgba(58,46,37,.05); }

        .menubar { background:var(--white); border-bottom:1.5px solid var(--brown); padding:0 52px; display:flex; align-items:center; gap:2px; height:32px; flex-shrink:0; }
        .menu-item { padding:3px 11px; font-size:.78rem; color:var(--brown); cursor:pointer; border-radius:5px; font-weight:500; transition:all var(--ease); }
        .menu-item:hover { background:var(--white); color:var(--brown); }

        .formula-bar { background:var(--white); border-bottom:1px solid rgba(58,46,37,.15); padding:0 8px; display:flex; align-items:center; gap:8px; height:30px; flex-shrink:0; }
        .cell-ref { width:68px; border:1.5px solid rgba(58,46,37,.3); border-radius:5px; padding:2px 6px; font-size:.75rem; font-family:'DM Sans',sans-serif; color:var(--brown); text-align:center; background:var(--c1); }
        .formula-divider { width:1px; height:16px; background:var(--white); }
        .formula-input { flex:1; border:none; outline:none; font-size:.78rem; font-family:'DM Sans',sans-serif; color:var(--brown); background:transparent; }

        .sheet-area { flex:1; overflow:auto; background:var(--white); order:2; }
        .grid-wrapper { min-width:max-content; }
        table.grid { border-collapse:collapse; table-layout:fixed; }

        .grid th.row-num,.grid td.row-num { width:42px; min-width:42px; background:var(--white); border-right:1px solid rgba(58,46,37,.12); border-bottom:1px solid rgba(58,46,37,.1); text-align:center; font-size:.72rem; color:var(--brown); font-weight:500; padding:0; user-select:none; position:sticky; left:0; z-index:2; }
        .grid thead th { background:var(--white); border-right:1px solid rgba(58,46,37,.12); border-bottom:1.5px solid var(--brown); font-size:.72rem; font-weight:700; color:var(--brown); padding:7px 8px; text-align:left; white-space:nowrap; user-select:none; position:sticky; top:0; z-index:1; text-transform:uppercase; letter-spacing:.4px; }
        .grid thead th.required-col::after { content:' *'; color:var(--brown); }
        .grid td { border-right:1px solid rgba(58,46,37,.08); border-bottom:1px solid rgba(58,46,37,.07); padding:0; height:26px; vertical-align:middle; }
        .grid td.selected { background:rgba(58,46,37,.06); outline:2px solid var(--brown); outline-offset:-2px; }
        .grid td input,.grid td select { width:100%; height:100%; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:.8rem; padding:0 6px; background:transparent; color:var(--brown); }
        .grid td select { cursor:pointer; background:var(--white); }
        .grid td:hover { background:rgba(58,46,37,.03); }
        .grid td input:focus,.grid td select:focus { background:rgba(58,46,37,.04); outline:2px solid var(--brown); outline-offset:-2px; }
        .grid tbody tr:nth-child(even) td:not(.row-num) { background:rgba(58,46,37,.03); }
        .grid tbody tr:nth-child(even) td input { background:transparent; }
        .grid tbody tr:nth-child(even) td:hover { background:rgba(58,46,37,.05); }

        .col-srno{width:60px;min-width:60px;} .col-fname{width:140px;min-width:120px;} .col-mname{width:130px;min-width:100px;} .col-lname{width:140px;min-width:120px;} .col-full{width:220px;min-width:180px;} .col-gender{width:90px;min-width:80px;} .col-mother{width:130px;min-width:100px;} .col-father{width:130px;min-width:100px;} .col-dob{width:130px;min-width:110px;}

        
        
        
        
        
        
        

        .status-bar { background:var(--white); border-top:1px solid rgba(58,46,37,.12); padding:3px 12px; font-size:.72rem; color:var(--brown); display:flex; gap:16px; align-items:center; flex-shrink:0; order:4; }
        .status-saved { color:#1E6B36; font-weight:600; }
        .status-unsaved { color:var(--brown); font-weight:600; }

        .toast { position:fixed; bottom:52px; left:50%; transform:translateX(-50%) translateY(14px); background:var(--brown); color:var(--white); padding:9px 20px; border-radius:8px; font-size:.82rem; font-weight:500; opacity:0; transition:all 220ms ease; z-index:100; pointer-events:none; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.success { background:#1E6B36; }
        .toast.error { background:#8B2020; }

        .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.9); display:none; align-items:center; justify-content:center; z-index:200; }
        .loading-overlay.show { display:flex; }
        .spinner { width:28px; height:28px; border:3px solid rgba(58,46,37,.2); border-top-color:var(--brown); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin{to{transform:rotate(360deg);}}

        /* Grade Picker */
        .grade-picker {
            position: fixed; inset: 0;
            background: var(--white);
            display: flex; align-items: center; justify-content: center;
            z-index: 300;
            flex-direction: column;
        }
        .grade-picker.hidden { display: none; }
        .grade-picker-box {
            border: 1.5px solid var(--brown);
            border-radius: 16px;
            padding: 40px 48px;
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .grade-picker-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-weight: 700;
            color: var(--brown); margin-bottom: 6px;
        }
        .grade-picker-sub {
            font-size: .84rem; color: var(--brown);
            margin-bottom: 28px; opacity: .6;
        }
        .grade-picker-btns {
            display: flex; flex-direction: column; gap: 10px;
        }
        .grade-pick-btn {
            padding: 13px 24px;
            border: 1.5px solid var(--brown);
            border-radius: 8px;
            background: var(--white);
            color: var(--brown);
            font-family: 'DM Sans', sans-serif;
            font-size: .95rem; font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease;
        }
        .grade-pick-btn:hover {
            background: var(--brown);
            color: var(--white);
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- GRADE PICKER -->
<div class="grade-picker" id="gradePicker">
    <div class="grade-picker-box">
        <div class="grade-picker-title" id="pickerSchoolName">Select a Class</div>
        <div class="grade-picker-sub">Choose the class you want to update</div>
        <div class="grade-picker-btns" id="pickerBtns">
            <!-- buttons injected by JS -->
        </div>
    </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <a href="teacher-space.html" class="back-btn" title="Back">←</a>
    <div class="doc-info">
        <div class="doc-title" id="docTitle">Student Registration</div>
        <div class="doc-sub" id="docSub">Loading...</div>
    </div>
    <div class="topbar-actions">
        <div style="display:flex;gap:8px;align-items:center;margin-right:4px;">
            <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(58,46,37,.06);border:1.5px solid var(--brown);border-radius:20px;padding:5px 14px;">
                <span style="font-size:.72rem;font-weight:600;color:var(--brown);">Total</span>
                <strong id="sumTotal" style="font-size:.82rem;color:var(--brown);">0</strong>
            </div>
            <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(58,46,37,.06);border:1.5px solid var(--brown);border-radius:20px;padding:5px 14px;">
                <span style="font-size:.72rem;font-weight:600;color:var(--brown);">Male</span>
                <strong id="sumMale" style="font-size:.82rem;color:var(--brown);">0</strong>
            </div>
            <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(58,46,37,.06);border:1.5px solid var(--brown);border-radius:20px;padding:5px 14px;">
                <span style="font-size:.72rem;font-weight:600;color:var(--brown);">Female</span>
                <strong id="sumFemale" style="font-size:.82rem;color:var(--brown);">0</strong>
            </div>
        </div>
        <button class="tb-btn tb-btn-outline" onclick="showGradePicker()" id="gradePickerBtn">Grade 6</button>
        <button class="tb-btn tb-btn-outline" onclick="addRow()">+ Add Row</button>
        <button class="tb-btn tb-btn-outline" onclick="deleteSelectedRow()">Delete Row</button>
        <button class="tb-btn tb-btn-save" id="saveBtn" onclick="saveSheet()">Save</button>
        <span class="logout-link" onclick="logout()">Logout</span>
    </div>
</div>

<!-- MENU BAR -->
<div class="menubar">
    <span class="menu-item" onclick="addRow()">Insert Row</span>
    <span class="menu-item" onclick="clearSheet()">Clear Sheet</span>
</div>

<!-- FORMULA BAR -->
<div class="formula-bar">
    <input class="cell-ref" id="cellRef" value="A1" readonly>
    <div class="formula-divider"></div>
    <input class="formula-input" id="formulaBar" placeholder="Click a cell to edit..." readonly>
</div>

<!-- SPREADSHEET -->
<div class="sheet-area" id="sheetArea">
    <div class="grid-wrapper">
        <table class="grid" id="mainGrid">
            <thead>
                <tr>
                    <th class="row-num">⠿</th>
                    <th class="col-srno">Sr No</th>
                    <th class="col-fname required-col">First Name</th>
                    <th class="col-mname">Middle Name</th>
                    <th class="col-lname required-col">Last Name</th>
                    <th class="col-full">Full Name</th>
                    <th class="col-gender">Gender</th>
                    <th class="col-mother">Mother Name</th>
                    <th class="col-father">Father Name</th>
                    <th class="col-dob">Date of Birth</th>
                </tr>
            </thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
    <span id="statusText">Ready</span>
    <span id="rowCountText"></span>
    <span id="saveStatus"></span>
</div>

<script>
    // ─────────────────────────────
    // SUPABASE
    // ─────────────────────────────
    const SUPABASE_URL      = 'https://soesdipnikhtnuuemstm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZXNkaXBuaWtodG51dWVtc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTM4NDMsImV4cCI6MjA5NDkyOTg0M30._o831V46iMi9y7d_FRZ_ZfZ8nDOuFflLJLiUdpZKzko';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─────────────────────────────
    // AUTH
    // ─────────────────────────────
    if (sessionStorage.getItem('loggedIn') !== 'true') window.location.href = 'login.html';
    const USERNAME    = sessionStorage.getItem('username')   || '';
    const SCHOOL_NAME = sessionStorage.getItem('schoolName') || '';

    document.getElementById('docTitle').textContent = SCHOOL_NAME || 'Student Registration';
    const hasKaushalBodh = sessionStorage.getItem('hasKaushalBodh') === 'true';
    document.getElementById('docSub').textContent = 'UDISE: ' + USERNAME;

    // Show/hide grade tabs based on Kaushal Bodh
    if (!hasKaushalBodh) {
        document.getElementById('tab6').style.display = 'none';
        document.getElementById('tab7').style.display = 'none';
        document.getElementById('tab8').style.display = 'none';
    }

    // Build grade picker buttons
    const grades = hasKaushalBodh ? [6, 7, 8, 9] : [9];
    const pickerBtns = document.getElementById('pickerBtns');
    document.getElementById('pickerSchoolName').textContent = SCHOOL_NAME || 'Select a Class';
    grades.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'grade-pick-btn';
        btn.textContent = 'Grade ' + g;
        btn.onclick = () => {
            document.getElementById('gradePicker').classList.add('hidden');
            switchGrade(g);
        };
        pickerBtns.appendChild(btn);
    });

    // ─────────────────────────────
    // STATE
    // ─────────────────────────────
    let currentGrade  = 6;
    let gradeData     = { 6: [], 7: [], 8: [], 9: [] };  // rows per grade
    let selectedRow   = null;
    let unsaved       = false;

    const COLS = ['sr_no','first_name','middle_name','last_name','full_name','gender','mother_name','father_name','date_of_birth'];
    const DEFAULT_ROWS = 30;

    // ─────────────────────────────
    // INIT
    // ─────────────────────────────
    (async function init() {
        showLoading(true);
        try {
            const { data, error } = await sb
                .from('students')
                .select('*')
                .eq('udise_code', USERNAME)
                .order('grade').order('sr_no');

            if (error) throw error;

            // Distribute into grade buckets
            [6, 7, 8, 9].forEach(g => {
                gradeData[g] = (data || [])
                    .filter(r => String(r.grade) === String(g))
                    .map(r => ({
                        id:            r.id,
                        sr_no:         r.sr_no || '',
                        first_name:    r.first_name || '',
                        middle_name:   r.middle_name || '',
                        last_name:     r.last_name || '',
                        full_name:     r.full_name || '',
                        gender:        r.gender || '',
                        mother_name:   r.mother_name || '',
                        father_name:   r.father_name || '',
                        date_of_birth: r.date_of_birth || ''
                    }));
            });

            renderGrid(currentGrade);
        } catch (e) {
            toast('Could not load data: ' + e.message, 'error');
        } finally {
            showLoading(false);
        }
    })();

    // ─────────────────────────────
    // RENDER GRID
    // ─────────────────────────────
    function renderGrid(grade) {
        const rows = gradeData[grade];
        // Pad to at least DEFAULT_ROWS
        const total = Math.max(rows.length + 5, DEFAULT_ROWS);
        const body  = document.getElementById('gridBody');
        body.innerHTML = '';

        for (let i = 0; i < total; i++) {
            const r = rows[i] || {};
            body.appendChild(makeRow(i, r));
        }

        updateStatus();
        setSaveStatus(false);
    }

    // ─────────────────────────────
    // MAKE A GRID ROW
    // ─────────────────────────────
    function makeRow(idx, data) {
        const tr = document.createElement('tr');
        tr.dataset.idx = idx;

        // Row number
        const num = document.createElement('td');
        num.className = 'row-num';
        num.textContent = idx + 1;
        num.onclick = () => selectRow(idx);
        tr.appendChild(num);

        // Sr No
        tr.appendChild(makeCell(idx, 'sr_no', data.sr_no || (idx + 1), 'number'));

        // First Name
        tr.appendChild(makeCell(idx, 'first_name', data.first_name || '', 'text'));

        // Middle Name
        tr.appendChild(makeCell(idx, 'middle_name', data.middle_name || '', 'text'));

        // Last Name
        tr.appendChild(makeCell(idx, 'last_name', data.last_name || '', 'text'));

        // Full Name (auto-filled)
        tr.appendChild(makeCell(idx, 'full_name', data.full_name || '', 'text'));

        // Gender (dropdown)
        tr.appendChild(makeGenderCell(idx, data.gender || ''));

        // Mother Name
        tr.appendChild(makeCell(idx, 'mother_name', data.mother_name || '', 'text'));

        // Father Name
        tr.appendChild(makeCell(idx, 'father_name', data.father_name || '', 'text'));

        // Date of Birth
        tr.appendChild(makeCell(idx, 'date_of_birth', data.date_of_birth || '', 'text', 'DD/MM/YYYY'));

        return tr;
    }

    function makeCell(idx, field, value, type, placeholder) {
        const td  = document.createElement('td');
        const inp = document.createElement('input');
        inp.type        = 'text';
        inp.value       = value;
        inp.placeholder = placeholder || '';
        inp.dataset.field = field;
        inp.dataset.idx   = idx;

        inp.onfocus = () => {
            selectRow(idx);
            document.getElementById('cellRef').value    = colLetter(field) + (idx + 1);
            document.getElementById('formulaBar').value = inp.value;
        };

        inp.oninput = () => {
            setCell(idx, field, inp.value);
            document.getElementById('formulaBar').value = inp.value;
            // Auto-fill Full Name
            if (['first_name','middle_name','last_name'].includes(field)) {
                autoFillFullName(idx);
            }
            markUnsaved();
        };

        // Support paste from Excel (Tab-separated)
        inp.onpaste = (e) => {
            const text = (e.clipboardData || window.clipboardData).getData('text');
            if (text.includes('\t') || text.includes('\n')) {
                e.preventDefault();
                handleGridPaste(idx, field, text);
            }
        };

        inp.onkeydown = (e) => handleKeyNav(e, idx, field);

        td.appendChild(inp);
        return td;
    }

    function makeGenderCell(idx, value) {
        const td  = document.createElement('td');
        const sel = document.createElement('select');
        sel.dataset.field = 'gender';
        sel.dataset.idx   = idx;

        ['','Male','Female','Other'].forEach(opt => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt || 'select';
            if (opt === value) o.selected = true;
            sel.appendChild(o);
        });

        sel.onchange = () => { setCell(idx, 'gender', sel.value); markUnsaved(); updateSummary(); };
        sel.onfocus  = () => selectRow(idx);
        td.appendChild(sel);
        return td;
    }

    // ─────────────────────────────
    // AUTO-FILL FULL NAME
    // ─────────────────────────────
    function autoFillFullName(idx) {
        const row = gradeData[currentGrade][idx];
        if (!row) return;
        const full = [row.first_name, row.middle_name, row.last_name].filter(Boolean).join(' ').toUpperCase();
        setCell(idx, 'full_name', full);
        // Update the DOM input
        const inp = document.querySelector(`input[data-idx="${idx}"][data-field="full_name"]`);
        if (inp) inp.value = full;
    }

    // ─────────────────────────────
    // SET CELL VALUE IN STATE
    // ─────────────────────────────
    function setCell(idx, field, value) {
        if (!gradeData[currentGrade][idx]) {
            gradeData[currentGrade][idx] = {};
        }
        gradeData[currentGrade][idx][field] = value;
    }

    // ─────────────────────────────
    // PASTE FROM EXCEL (multi-cell)
    // ─────────────────────────────
    function handleGridPaste(startRow, startField, text) {
        const lines     = text.trim().split('\n');
        const fieldOrder = COLS;
        const startCol   = fieldOrder.indexOf(startField);

        lines.forEach((line, rowOffset) => {
            const cells = line.split('\t');
            cells.forEach((val, colOffset) => {
                const colIdx = startCol + colOffset;
                const rowIdx = startRow + rowOffset;
                if (colIdx >= fieldOrder.length) return;
                const field = fieldOrder[colIdx];
                setCell(rowIdx, field, val.trim());

                // Update DOM
                const inp = document.querySelector(`input[data-idx="${rowIdx}"][data-field="${field}"]`);
                if (inp) inp.value = val.trim();
                const sel = document.querySelector(`select[data-idx="${rowIdx}"][data-field="${field}"]`);
                if (sel) sel.value = val.trim();

                // Auto-fill full name if name columns pasted
                if (['first_name','middle_name','last_name'].includes(field)) {
                    autoFillFullName(rowIdx);
                }
            });
        });

        // Add more rows if needed
        const lastRowNeeded = startRow + lines.length;
        ensureRows(lastRowNeeded + 5);
        markUnsaved();
        toast(`Pasted ${lines.length} row(s)`, 'success');
    }

    function ensureRows(count) {
        const body = document.getElementById('gridBody');
        while (body.rows.length < count) {
            const idx = body.rows.length;
            body.appendChild(makeRow(idx, {}));
        }
    }

    // ─────────────────────────────
    // KEYBOARD NAVIGATION
    // ─────────────────────────────
    function handleKeyNav(e, idx, field) {
        const fieldOrder = COLS;
        const colIdx     = fieldOrder.indexOf(field);

        if (e.key === 'Tab') {
            e.preventDefault();
            const nextCol = e.shiftKey ? colIdx - 1 : colIdx + 1;
            if (nextCol >= 0 && nextCol < fieldOrder.length) {
                focusCell(idx, fieldOrder[nextCol]);
            } else if (!e.shiftKey && colIdx === fieldOrder.length - 1) {
                ensureRows(idx + 2);
                focusCell(idx + 1, fieldOrder[0]);
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            ensureRows(idx + 2);
            focusCell(idx + 1, field);
        } else if (e.key === 'ArrowDown') {
            ensureRows(idx + 2);
            focusCell(idx + 1, field);
        } else if (e.key === 'ArrowUp' && idx > 0) {
            focusCell(idx - 1, field);
        }
    }

    function focusCell(idx, field) {
        const inp = document.querySelector(`input[data-idx="${idx}"][data-field="${field}"]`);
        if (inp) { inp.focus(); inp.select(); }
        const sel = document.querySelector(`select[data-idx="${idx}"][data-field="${field}"]`);
        if (sel) sel.focus();
    }

    // ─────────────────────────────
    // ROW SELECTION
    // ─────────────────────────────
    function selectRow(idx) {
        selectedRow = idx;
        document.querySelectorAll('.grid tbody tr').forEach((tr, i) => {
            tr.querySelector('.row-num').style.background =
                i === idx ? '#E8F0FE' : '';
        });
    }

    // ─────────────────────────────
    // ADD / DELETE ROWS
    // ─────────────────────────────
    function addRow() {
        const body = document.getElementById('gridBody');
        const idx  = body.rows.length;
        body.appendChild(makeRow(idx, {}));
        focusCell(idx, 'sr_no');
        updateStatus();
    }

    function deleteSelectedRow() {
        if (selectedRow === null) { toast('Click on a row number to select it first'); return; }
        const idx = selectedRow;
        gradeData[currentGrade].splice(idx, 1);
        renderGrid(currentGrade);
        markUnsaved();
        toast('Row deleted');
        selectedRow = null;
    }

    function clearSheet() {
        if (!confirm(`Clear ALL students in Grade ${currentGrade}? This cannot be undone.`)) return;
        gradeData[currentGrade] = [];
        renderGrid(currentGrade);
        markUnsaved();
    }

    // ─────────────────────────────
    // SWITCH GRADE TAB
    // ─────────────────────────────
    async function switchGrade(grade) {
        if (unsaved) {
            if (!confirm('You have unsaved changes. Save before switching?')) {
                // Switch without saving
            } else {
                await saveSheet();
            }
        }
        currentGrade = grade;
        const btn = document.getElementById('gradePickerBtn');
        if (btn) btn.textContent = 'Grade ' + grade;
        renderGrid(grade);
    }

    // ─────────────────────────────
    // SAVE
    // ─────────────────────────────
    async function saveSheet() {
        showLoading(true);
        document.getElementById('saveBtn').disabled = true;

        try {
            // Collect non-empty rows from current grade
            const rows = collectRows();

            if (rows.length === 0) {
                toast('Nothing to save add some students first!');
                return;
            }

            // Delete existing records for this grade+UDISE
            const { error: delErr } = await sb
                .from('students')
                .delete()
                .eq('udise_code', USERNAME)
                .eq('grade', String(currentGrade));

            if (delErr) throw delErr;

            // Insert new records
            const toInsert = rows.map((r, i) => ({
                udise_code:    USERNAME,
                school_name:   SCHOOL_NAME,
                grade:         String(currentGrade),
                sr_no:         parseInt(r.sr_no) || (i + 1),
                first_name:    r.first_name || '',
                middle_name:   r.middle_name || '',
                last_name:     r.last_name || '',
                full_name:     r.full_name || [r.first_name, r.middle_name, r.last_name].filter(Boolean).join(' '),
                gender:        r.gender || '',
                mother_name:   r.mother_name || '',
                father_name:   r.father_name || '',
                date_of_birth: r.date_of_birth || ''
            }));

            const { error: insErr } = await sb.from('students').insert(toInsert);
            if (insErr) throw insErr;

            // Update local state
            gradeData[currentGrade] = rows;

            setSaveStatus(true);
            markUnsaved(false);
            toast(`✅ Saved ${rows.length} students for Grade ${currentGrade}`, 'success');

        } catch (e) {
            toast('Save failed: ' + e.message, 'error');
        } finally {
            showLoading(false);
            document.getElementById('saveBtn').disabled = false;
        }
    }

    // Collect non-empty rows from the DOM
    function collectRows() {
        const body = document.getElementById('gridBody');
        const rows = [];

        Array.from(body.rows).forEach((tr, idx) => {
            const row = {};
            COLS.forEach(field => {
                const inp = tr.querySelector(`input[data-field="${field}"]`);
                const sel = tr.querySelector(`select[data-field="${field}"]`);
                row[field] = (inp ? inp.value : sel ? sel.value : '').trim();
            });
            // Only save if at least a first name exists
            if (row.first_name || row.full_name) rows.push(row);
        });

        return rows;
    }

    // ─────────────────────────────
    // EXPORT CSV
    // ─────────────────────────────
    function exportCSV() {
        const rows = collectRows();
        if (rows.length === 0) { toast('No data to export'); return; }

        const headers = ['Sr No','First Name','Middle Name','Last Name','Full Name','Gender','Mother Name','Father Name','Date of Birth','Grade','School','UDISE'];
        const csvRows = rows.map(r => [
            r.sr_no, r.first_name, r.middle_name, r.last_name,
            r.full_name, r.gender, r.mother_name, r.father_name,
            r.date_of_birth, currentGrade, SCHOOL_NAME, USERNAME
        ].map(v => `"${(v||'').replace(/"/g,'""')}"`));

        const csv  = [headers, ...csvRows].map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `${SCHOOL_NAME}_Grade${currentGrade}_students.csv`;
        a.click();
        toast('CSV downloaded!', 'success');
    }

    // ─────────────────────────────
    // PASTE HELP
    // ─────────────────────────────
    function pasteHelp() {
        alert('📋 How to paste from Excel:\n\n1. Open your Excel file (Grade_6, Grade_7, Grade_8 sheet)\n2. Select the data rows (from Sr No column to Date of Birth column)\n3. Press Ctrl+C to copy\n4. Click on the first cell (Sr No column, Row 1) in the grid\n5. Press Ctrl+V to paste\n\nData will fill in automatically!');
    }

    // ─────────────────────────────
    // HELPERS
    // ─────────────────────────────
    function colLetter(field) {
        const map = { sr_no:'A', first_name:'B', middle_name:'C', last_name:'D', full_name:'E', gender:'F', mother_name:'G', father_name:'H', date_of_birth:'I' };
        return map[field] || 'A';
    }

    function markUnsaved(state = true) {
        unsaved = state;
        setSaveStatus(!state);
    }

    function setSaveStatus(saved) {
        const el = document.getElementById('saveStatus');
        if (saved) {
            el.className = 'status-saved';
            el.textContent = '✓ All changes saved';
        } else if (unsaved) {
            el.className = 'status-unsaved';
            el.textContent = '● Unsaved changes';
        } else {
            el.textContent = '';
        }
    }

    function updateStatus() {
        const rows = collectRows();
        document.getElementById('statusText').textContent = `Grade ${currentGrade}`;
        document.getElementById('rowCountText').textContent = `${rows.length} students`;
        updateSummary();
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').classList.toggle('show', show);
    }

    function toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className   = 'toast show ' + type;
        setTimeout(() => { el.className = 'toast'; }, 3000);
    }

    function logout() {
        if (confirm('Logout?')) { sessionStorage.clear(); window.location.href = 'login.html'; }
    }

    // Update summary counts
    function showGradePicker() {
        document.getElementById('gradePicker').classList.remove('hidden');
    }

    function updateSummary() {
        const rows = collectRows();
        const total  = rows.length;
        const male   = rows.filter(r => (r.gender||'').toLowerCase() === 'male').length;
        const female = rows.filter(r => (r.gender||'').toLowerCase() === 'female').length;
        document.getElementById('sumTotal').textContent  = total;
        document.getElementById('sumMale').textContent   = male;
        document.getElementById('sumFemale').textContent = female;
    }

    // Warn before leaving with unsaved changes
    window.onbeforeunload = (e) => {
        if (unsaved) { e.preventDefault(); e.returnValue = ''; }
    };
</script>
</body>
</html>
